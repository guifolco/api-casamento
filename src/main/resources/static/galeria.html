<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galeria - Luau do Thomas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* As cores base para o overlay escuro */
            --fundo-luau-escuro: rgba(2, 17, 29, 0.85); 
            --fundo-luau-claro: rgba(10, 58, 90, 0.75); 
            --texto-claro: #FDFBFB;
            --flor-principal: #FF416C; 
        }

        body {
            font-family: 'Poppins', sans-serif;

            /* --- NOVO BACKGROUND TROPICAL (Igual ao index.html) --- */
            background-image: 
                linear-gradient(135deg, var(--fundo-luau-escuro) 0%, var(--fundo-luau-claro) 100%),
                url('https://img.freepik.com/fotos-gratis/fundo-de-folhas-tropicais-escuras_53876-88686.jpg?w=1380&t=st=1709588689~exp=1709589289~hmac=4478696247402291368782740505668031766170845245889248544304758791');
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* -------------------------------- */

            min-height: 100vh;
            color: var(--texto-claro);
            padding-bottom: 40px;
        }

        .cabecalho {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            /* Fundo do cabeçalho mais escuro e borrado para ler o texto sobre as flores */
            background: rgba(2, 11, 20, 0.8); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn-voltar { color: var(--texto-claro); text-decoration: none; display: flex; align-items: center; gap: 5px; font-weight: 600; font-size: 15px; }
        .titulo-galeria { font-weight: 700; font-size: 18px; letter-spacing: 0.5px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .grid-galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 20px; 
            padding: 25px; 
        }

        /* Polaroids com sombra reforçada para destacar do fundo texturizado */
        .foto-item {
            width: 100%; height: 170px; object-fit: cover; 
            background-color: #f8f8f8; 
            padding: 8px 8px 35px 8px; 
            border-radius: 2px;
            box-shadow: 2px 8px 20px rgba(0,0,0,0.6); 
            cursor: pointer; 
            transition: transform 0.3s ease, z-index 0.3s;
            position: relative;
            z-index: 1;
        }

        .foto-item:nth-child(2n) { transform: rotate(-3deg); }
        .foto-item:nth-child(3n) { transform: rotate(4deg); }
        .foto-item:nth-child(4n) { transform: rotate(-2deg); }
        .foto-item:nth-child(5n) { transform: rotate(3deg); }

        .foto-item:active { transform: scale(0.95) rotate(0deg); z-index: 5; }

        .lightbox-overlay {
            display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); /* Fundo do lightbox mais escuro */
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            justify-content: center; align-items: center; animation: fadeInModal 0.3s ease;
        }

        .lightbox-img {
            max-width: 100%; max-height: 90vh; object-fit: contain; border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); transform: scale(0.95); transition: transform 0.2s ease;
        }

        .btn-fechar {
            position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer;
            background: rgba(255,255,255,0.1); border-radius: 50%; padding: 8px; z-index: 1001;
        }

        .btn-nav {
            position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer;
            background: rgba(0,0,0,0.3); border-radius: 50%; padding: 5px; z-index: 1001; transition: background 0.2s;
        }
        .btn-nav:active { background: rgba(255,255,255,0.3); }
        .nav-esq { left: 10px; }
        .nav-dir { right: 10px; }

        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }
        .mensagem-vazia { text-align: center; margin-top: 50px; color: rgba(255,255,255,0.8); padding: 20px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); font-weight: 600;}
    </style>
</head>
<body>

    <div class="cabecalho">
        <a href="/" class="btn-voltar"><span class="material-icons-round">arrow_back_ios</span>Voltar</a>
        <div class="titulo-galeria">Mural da Festa</div>
        <div style="width: 24px;"></div>
    </div>

    <div class="grid-galeria" id="grid"></div>

    <div class="lightbox-overlay" id="lightbox">
        <span class="material-icons-round btn-fechar" onclick="fecharLightbox()">close</span>
        <span class="material-icons-round btn-nav nav-esq" onclick="mudarFoto(-1, event)">chevron_left</span>
        <img src="" alt="Foto ampliada" class="lightbox-img" id="lightbox-img">
        <span class="material-icons-round btn-nav nav-dir" onclick="mudarFoto(1, event)">chevron_right</span>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        
        let listaDeFotos = []; let indiceAtual = 0; 

        function abrirLightbox(index) {
            indiceAtual = index; lightboxImg.src = listaDeFotos[indiceAtual].url; 
            lightbox.style.display = 'flex';
            setTimeout(() => { lightboxImg.style.transform = "scale(1)"; }, 10);
        }

        function mudarFoto(direcao, event) {
            if (event) event.stopPropagation(); 
            lightboxImg.style.transform = "scale(0.95)"; 
            indiceAtual += direcao;
            if (indiceAtual >= listaDeFotos.length) indiceAtual = 0;
            else if (indiceAtual < 0) indiceAtual = listaDeFotos.length - 1;
            setTimeout(() => {
                lightboxImg.src = listaDeFotos[indiceAtual].url; 
                lightboxImg.style.transform = "scale(1)";
            }, 150); 
        }

        function fecharLightbox() {
            lightbox.style.display = 'none';
            lightboxImg.src = ''; lightboxImg.style.transform = "scale(0.95)";
        }

        lightbox.addEventListener('click', function(e) { if (e.target === lightbox) fecharLightbox(); });

        let touchstartX = 0; let touchendX = 0;
        lightbox.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; });
        lightbox.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchstartX - touchendX > 50) mudarFoto(1); 
            if (touchendX - touchstartX > 50) mudarFoto(-1); 
        });

        document.addEventListener('keydown', function(event) {
            if (lightbox.style.display === 'flex') {
                if (event.key === "ArrowRight") mudarFoto(1);
                if (event.key === "ArrowLeft") mudarFoto(-1);
                if (event.key === "Escape") fecharLightbox();
            }
        });

        async function carregarGaleria() {
            try {
                const response = await fetch('/api/fotos/lista');
                if (response.ok) {
                    let fotos = await response.json();
                    fotos.reverse(); 

                    if (fotos.length === 0) {
                        grid.innerHTML = '<div class="mensagem-vazia">Nenhuma foto ainda. Seja o primeiro a quebrar o gelo! 🥥📸</div>';
                        return;
                    }

                    listaDeFotos = fotos; grid.innerHTML = '';

                    fotos.forEach((foto, index) => {
                        const img = document.createElement('img');
                        img.src = foto.url; img.className = 'foto-item';
                        img.onclick = function() { abrirLightbox(index); };
                        grid.appendChild(img);
                    });
                }
            } catch (error) {
                grid.innerHTML = '<div class="mensagem-vazia">Erro ao carregar o mural. Tente atualizar a página.</div>';
            }
        }

        carregarGaleria();
    </script>
</body>
</html>
