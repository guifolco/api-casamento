        input[type="file"] {
            display: none !important;
        }

        .btn-upload {
            display: inline-block;
            background-color: #2c5e3b;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s ease;
            box-shadow: 0 4px 6px rgba(44, 94, 59, 0.3);
        }

        .btn-upload:active, .btn-upload:hover {
            background-color: #1a3b24;
            transform: scale(0.98);
        }
        #status-mensagem {
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #2c5e3b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Casamento da Isabella & Márcio (V2)</h1>
        <p>Capture nossos melhores momentos! Escaneie, tire uma foto e ela vai direto para o nosso telão.</p>

        <input type="file" id="fotoInput" accept="image/*" hidden style="display: none !important; visibility: hidden;">
        
        <label for="fotoInput" class="btn-upload">
            📸 Enviar uma Foto
        </label>

        <div id="status-mensagem"></div>
    </div>

    <script>
        const fotoInput = document.getElementById('fotoInput');
        const statusMensagem = document.getElementById('status-mensagem');

        fotoInput.addEventListener('change', async function(event) {
            
            const arquivo = event.target.files[0];

            if (!arquivo) return;

            statusMensagem.innerText = "⏳ Enviando foto para o telão... Aguarde!";
            statusMensagem.style.color = "#d97706";

            const formData = new FormData();
            formData.append("arquivo", arquivo);

            try {
                const response = await fetch("/api/fotos/upload", {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    statusMensagem.innerText = "✅ Foto enviada com sucesso! Tire outra!";
                    statusMensagem.style.color = "#2c5e3b"; // Verde
                } else {
                    statusMensagem.innerText = "❌ Ops! Algo deu errado. Tente de novo.";
                    statusMensagem.style.color = "#dc2626"; // Vermelho
                }

            } catch (error) {
                statusMensagem.innerText = "❌ Erro de conexão. Tente novamente mais tarde.";
                statusMensagem.style.color = "#dc2626";
                console.error("Erro detalhado:", error);
            }

            fotoInput.value = "";
        });
    </script>

</body>
</html>
