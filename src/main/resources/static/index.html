<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau do Thomas 🌺</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* As cores base para o overlay escuro */
            --fundo-luau-escuro: rgba(2, 17, 29, 0.85); 
            --fundo-luau-claro: rgba(10, 58, 90, 0.75); 

            /* Elementos: Rosa Hibisco e Laranja Pôr do Sol */
            --flor-principal: #FF416C;    
            --flor-clara: #FF4B2B;        
            --folha-luminosa: #00F260; 
            --folha-bg: rgba(0, 242, 96, 0.15);
            
            --texto-claro: #FDFBFB;
            --texto-secundario: #D1E8E2;
        }

        body {
            font-family: 'Poppins', sans-serif;
            
            /* --- NOVO BACKGROUND TROPICAL --- */
            /* 1. A primeira camada é um degradê escuro transparente para dar leitura */
            /* 2. A segunda camada (url) é a imagem das flores. Troque a URL se quiser outra imagem! */
            background-image: 
                linear-gradient(135deg, var(--fundo-luau-escuro) 0%, var(--fundo-luau-claro) 100%),
                url('https://img.freepik.com/fotos-gratis/fundo-de-folhas-tropicais-escuras_53876-88686.jpg?w=1380&t=st=1709588689~exp=1709589289~hmac=4478696247402291368782740505668031766170845245889248544304758791');
            
            background-size: cover; /* Faz a imagem cobrir a tela toda */
            background-position: center; /* Centraliza a imagem */
            background-attachment: fixed; /* O fundo fica parado quando a tela rola */
            /* -------------------------------- */

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--texto-claro);
            padding: 20px;
        }

        .container {
            /* Aumentei um pouco o blur do vidro para destacar mais do fundo floral */
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            max-width: 380px;
            width: 100%;
        }

        h1 {
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            color: var(--texto-claro);
            line-height: 1.2;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8); /* Sombra mais forte no texto */
        }

        p.descricao {
            color: var(--texto-secundario);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* Botão Sunset */
        .btn-tropical {
            background: linear-gradient(45deg, var(--flor-principal), var(--flor-clara));
            color: white; 
            padding: 20px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            box-shadow: 0 8px 25px rgba(255, 65, 108, 0.4);
            transition: all 0.2s ease;
            animation: pulse-flor 2.5s infinite;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-tropical:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(255, 65, 108, 0.3);
        }

        .contador-fotos {
            margin-top: 35px;
            font-size: 14px;
            font-weight: 600;
            color: var(--folha-luminosa); 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 20, 10, 0.6); /* Fundo mais escuro pro contador */
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(0, 242, 96, 0.3);
            backdrop-filter: blur(5px);
        }

        .contador-fotos .material-icons-round { font-size: 18px; }

        .btn-secundario {
            background: rgba(0,0,0,0.2); /* Fundo sutil */
            color: var(--texto-claro);
            padding: 15px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: 2px solid var(--flor-principal);
            margin-top: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-secundario:active { background: rgba(255, 65, 108, 0.15); transform: scale(0.97); }
        .material-icons-round { font-size: 24px; }

        @keyframes pulse-flor {
            0% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(255, 65, 108, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 65, 108, 0); }
        }

        #status-mensagem { margin-top: 25px; font-size: 14px; font-weight: 600; min-height: 25px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .sucesso { color: var(--folha-luminosa); }
        .erro { color: #FF4B2B; } 
        .carregando { color: var(--texto-secundario); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Luau do Thomas 🌴</h1>
        <p class="descricao">Aloha! 🌺 Tire uma foto e compartilhe os melhores momentos dessa noite com a gente.</p>

        <input type="file" id="fotoInput" accept="image/*" hidden style="display: none !important; visibility: hidden;">
        
        <label for="fotoInput" class="btn-tropical" id="labelBotao">
            <span class="material-icons-round">photo_camera</span>
            Tirar Foto
        </label>

        <div class="contador-fotos">
            <span class="material-icons-round">local_florist</span>
            <span id="total-fotos">--</span> fotos no mural
        </div>

        <a href="galeria.html" class="btn-secundario">
            <span class="material-icons-round">grid_view</span>
            Mural do Luau
        </a>

        <p id="status-mensagem"></p>
    </div>

    <script>
        const fotoInput = document.getElementById('fotoInput');
        const statusMensagem = document.getElementById('status-mensagem');
        const labelBotao = document.getElementById('labelBotao');
        const textoOriginalBotao = labelBotao.innerHTML;

        async function atualizarContador() {
            try {
                const response = await fetch('/api/fotos/total');
                if (response.ok) {
                    const total = await response.text();
                    document.getElementById('total-fotos').textContent = total;
                }
            } catch (error) {
                console.error('Erro ao buscar total:', error);
            }
        }

        atualizarContador();

        // Compressão Front-end
        function comprimirImagem(file, maxDimen, qualidade) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxDimen) { height = Math.round((height *= maxDimen / width)); width = maxDimen; }
                        } else {
                            if (height > maxDimen) { width = Math.round((width *= maxDimen / height)); height = maxDimen; }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                        }, 'image/jpeg', qualidade);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        fotoInput.addEventListener('change', async function() {
            let arquivo = this.files[0];
            if (!arquivo) return;

            labelBotao.innerHTML = '<span class="material-icons-round">hourglass_top</span> Preparando...';
            labelBotao.style.opacity = "0.8"; labelBotao.style.animation = "none";
            statusMensagem.textContent = "Colando no mural...";
            statusMensagem.className = "carregando";

            try {
                arquivo = await comprimirImagem(arquivo, 1920, 0.85);
                const formData = new FormData();
                formData.append('arquivo', arquivo);

                const response = await fetch('/api/fotos/upload', { method: 'POST', body: formData });

                if (response.ok) {
                    await response.text();
                    statusMensagem.innerHTML = '🥥 Sucesso! Foto enviada.';
                    statusMensagem.className = "sucesso";
                    atualizarContador();
                } else if (response.status === 406) {
                    const mensagemDeErro = await response.text();
                    statusMensagem.innerHTML = '🚨 ' + mensagemDeErro;
                    statusMensagem.className = "erro"; 
                } else {
                    throw new Error('Erro no servidor');
                }
            } catch (error) {
                statusMensagem.textContent = "❌ Ops! A onda levou a foto. Tente de novo.";
                statusMensagem.className = "erro";
            } finally {
                labelBotao.innerHTML = textoOriginalBotao;
                labelBotao.style.opacity = "1";
                labelBotao.style.animation = "pulse-flor 2.5s infinite"; 
                fotoInput.value = '';
            }
        });
    </script>
</body>
</html>
