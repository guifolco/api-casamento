<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samara & Adriano - 30/05</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Fundo: Verde Eucalipto Noturno (Overlay) */
            --fundo-casamento-escuro: rgba(14, 28, 21, 0.90); 
            --fundo-casamento-claro: rgba(26, 48, 38, 0.85); 

            /* Elementos: Verde Sálvia e Dourado Metálico */
            --verde-principal: #557A46;    
            --verde-claro: #7A9D54;        
            --icone-luminoso: #F2E3C6; /* Tom areia/dourado suave para os ícones */
            --icone-bg: rgba(242, 227, 198, 0.15);
            
            --texto-claro: #FDFBFB;
            --texto-secundario: #C2D5C9;
        }

        body {
            font-family: 'Poppins', sans-serif;
            
            /* Background Botânico Elegante */
            background-image: 
                linear-gradient(135deg, var(--fundo-casamento-escuro) 0%, var(--fundo-casamento-claro) 100%),
                url('https://images.unsplash.com/photo-1542314831-c6a4d14093f0?q=80&w=1500&auto=format&fit=crop'); /* Folhas escuras elegantes */
            
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 

            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--texto-claro);
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            max-width: 380px;
            width: 100%;
        }

        h1 {
            font-weight: 700;
            font-size: 32px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            color: var(--texto-claro);
            line-height: 1.2;
            text-shadow: 0 2px 15px rgba(0,0,0,0.8); 
        }

        p.descricao {
            color: var(--texto-secundario);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        /* Botão Sálvia */
        .btn-casamento {
            background: linear-gradient(45deg, var(--verde-principal), var(--verde-claro));
            color: white; 
            padding: 20px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            box-shadow: 0 8px 25px rgba(85, 122, 70, 0.4);
            transition: all 0.2s ease;
            animation: pulse-verde 2.5s infinite;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-casamento:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(85, 122, 70, 0.3);
        }

        .contador-fotos {
            margin-top: 35px;
            font-size: 14px;
            font-weight: 600;
            color: var(--icone-luminoso); 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3); 
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid rgba(242, 227, 198, 0.2);
            backdrop-filter: blur(5px);
        }

        .contador-fotos .material-icons-round { font-size: 18px; }

        .btn-secundario {
            background: rgba(0,0,0,0.2);
            color: var(--texto-claro);
            padding: 15px 24px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            border: 2px solid var(--verde-claro);
            margin-top: 20px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-secundario:active { background: rgba(122, 157, 84, 0.15); transform: scale(0.97); }
        .material-icons-round { font-size: 24px; }

        @keyframes pulse-verde {
            0% { box-shadow: 0 0 0 0 rgba(85, 122, 70, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(85, 122, 70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(85, 122, 70, 0); }
        }

        #status-mensagem { margin-top: 25px; font-size: 14px; font-weight: 600; min-height: 25px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .sucesso { color: var(--icone-luminoso); }
        .erro { color: #FF6B6B; } 
        .carregando { color: var(--texto-secundario); }

        /* Botão invisível para o DJ */
        .link-telao {
            margin-top: 35px;
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.3); /* Fica bem apagadinho */
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            width: 100%;
            transition: color 0.2s;
        }

        .link-telao:active { 
            color: rgba(255, 255, 255, 0.8); 
        }

        .link-telao .material-icons-round { 
            font-size: 14px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Samara & Adriano</h1>
        <p class="descricao">Compartilhe seus melhores momentos! Sua foto vai direto para o nosso álbum digital.</p>

        <input type="file" id="fotoInput" accept="image/*" hidden style="display: none !important; visibility: hidden;">
        
        <label for="fotoInput" class="btn-casamento" id="labelBotao">
            <span class="material-icons-round">photo_camera</span>
            Tirar Foto
        </label>

        <div class="contador-fotos">
            <span class="material-icons-round">favorite_border</span>
            <span id="total-fotos">--</span> momentos capturados
        </div>

        <a href="galeria.html" class="btn-secundario">
            <span class="material-icons-round">auto_awesome_mosaic</span>
            Álbum da Festa
        </a>

        <p id="status-mensagem"></p>

        <a href="telao.html" class="link-telao" target="_blank">
            <span class="material-icons-round">cast</span>
            Acesso do Telão (Staff)
        </a>
    </div>

    <script>
        const fotoInput = document.getElementById('fotoInput');
        const statusMensagem = document.getElementById('status-mensagem');
        const labelBotao = document.getElementById('labelBotao');
        const textoOriginalBotao = labelBotao.innerHTML;

        async function atualizarContador() {
            try {
                const response = await fetch('/api/fotos/total');
                if (response.ok) {
                    const total = await response.text();
                    document.getElementById('total-fotos').textContent = total;
                }
            } catch (error) {
                console.error('Erro ao buscar total:', error);
            }
        }

        atualizarContador();

        // Compressão Front-end
        function comprimirImagem(file, maxDimen, qualidade) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function() {
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxDimen) { height = Math.round((height *= maxDimen / width)); width = maxDimen; }
                        } else {
                            if (height > maxDimen) { width = Math.round((width *= maxDimen / height)); height = maxDimen; }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                        }, 'image/jpeg', qualidade);
                    };
                    img.onerror = error => reject(error);
                };
                reader.onerror = error => reject(error);
            });
        }

        fotoInput.addEventListener('change', async function() {
            let arquivo = this.files[0];
            if (!arquivo) return;

            labelBotao.innerHTML = '<span class="material-icons-round">hourglass_top</span> Preparando...';
            labelBotao.style.opacity = "0.8"; labelBotao.style.animation = "none";
            statusMensagem.textContent = "Otimizando imagem...";
            statusMensagem.className = "carregando";

            try {
                arquivo = await comprimirImagem(arquivo, 1920, 0.85);
                const formData = new FormData();
                formData.append('arquivo', arquivo);

                const response = await fetch('/api/fotos/upload', { method: 'POST', body: formData });

                if (response.ok) {
                    await response.text();
                    statusMensagem.innerHTML = '<span class="material-icons-round" style="vertical-align: middle; font-size: 18px;">check_circle</span> Sucesso! Foto enviada.';
                    statusMensagem.className = "sucesso";
                    atualizarContador();
                } else if (response.status === 406) {
                    const mensagemDeErro = await response.text();
                    statusMensagem.innerHTML = '🚨 ' + mensagemDeErro;
                    statusMensagem.className = "erro"; 
                } else {
                    throw new Error('Erro no servidor');
                }
            } catch (error) {
                statusMensagem.textContent = "❌ Ops! Algo deu errado. Tente de novo.";
                statusMensagem.className = "erro";
            } finally {
                labelBotao.innerHTML = textoOriginalBotao;
                labelBotao.style.opacity = "1";
                labelBotao.style.animation = "pulse-verde 2.5s infinite"; 
                fotoInput.value = '';
            }
        });
    </script>
</body>
</html>
